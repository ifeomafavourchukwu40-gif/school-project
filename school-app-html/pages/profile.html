<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .avatar:hover {
      opacity: 0.9;
      transition: opacity 0.2s;
    }
    
    .profile-message {
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media print {
      body * {
        visibility: hidden;
      }
      #printSummary, #printSummary * {
        visibility: visible;
      }
      #printSummary {
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        display: block !important;
      }
      .card, .btnrow, .sidebar, #mobileShell, .page-preloader {
        display: none !important;
      }
    }
  </style>
</head>
<body>
<!-- Page Preloader -->
<div class="page-preloader" id="pagePreloader">
  <img src="../assets/images/re-load.png" alt="Loading" class="preloader-image">
</div>
  
  <div class="wrap">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content">
      <div id="mobileShell"></div>
      
      <div id="printSummary" style="display: none; background: #fff; padding: 40px; color: #000;"></div>
      
      <div class="card">
        <h2 style="margin:0 0 10px 0">Edit Profile</h2>
        <div class="muted">Update your information.</div>
        
        <!-- Profile Picture Upload Section -->
        <div style="text-align: center; margin: 20px 0;">
          <div class="avatar" id="profileAvatarPreview" style="width: 100px; height: 100px; margin: 0 auto 16px; cursor: pointer; position: relative;">
            <img id="avatarPreview" src="../assets/images/logo.png" alt="Profile Picture" style="width: 100%; height: 100%;">
            <div style="position: absolute; bottom: 0; right: 0; background: var(--blue); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px;">
              ✎
            </div>
          </div>
          <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
          <button type="button" id="uploadBtn" class="btn secondary" style="margin: 0 auto; display: block;">
            Upload Profile Picture
          </button>
          <div class="muted" style="margin-top: 8px; font-size: 12px;">
            Click the picture or button to upload (JPG, PNG, max 2MB)
          </div>
        </div>
        
        <div class="formrow" style="margin-top:14px">
          <div>
            <label>First Name</label>
            <input id="firstName" placeholder="First name" />
          </div>
          <div>
            <label>Middle Name</label>
            <input id="middleName" placeholder="Middle name" />
          </div>
        </div>

        <div class="formrow">
          <div>
            <label>Last Name</label>
            <input id="lastName" placeholder="Last name" />
          </div>
          <div>
            <label>Email</label>
            <input id="email" type="email" placeholder="you@email.com" readonly style="opacity:0.7;" />
          </div>
        </div>
        
        <div class="formrow">
          <div>
            <label>Age</label>
            <input id="age" type="number" placeholder="Enter age" />
          </div>
          <div>
            <label>Class</label>
            <select id="classLevel" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--fg);">
              <option value="">Select Class</option>
              <option value="JS 1">JS 1</option>
              <option value="JS 2">JS 2</option>
              <option value="JS 3">JS 3</option>
              <option value="SS 1">SS 1</option>
              <option value="SS 2">SS 2</option>
              <option value="SS 3">SS 3</option>
            </select>
          </div>
        </div>
        
        <div class="formrow">
          <div>
            <label>Phone Number</label>
            <input id="phone" placeholder="080 1234 5678" />
          </div>
          <div>
            <label>Parent / Guardian Phone</label>
            <input id="parentPhone" placeholder="080 0000 0000" />
          </div>
        </div>

        <div class="formrow">
          <div>
            <label>State of Origin</label>
            <select id="state" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--fg);">
              <option value="">Select State</option>
            </select>
          </div>
          <div>
            <label>Local Government Area (LGA)</label>
            <select id="capital" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--fg);">
              <option value="">Select LGA</option>
            </select>
          </div>
        </div>

        <div class="formrow">
          <div>
            <label>Address</label>
            <input id="address" placeholder="Your address" />
          </div>
          <div>
            <label>Next of Kin</label>
            <input id="nextOfKin" placeholder="Full name of next of kin" />
          </div>
        </div>

        <div class="btnrow" style="margin-top: 20px;">
          <button class="btn" type="button" id="saveBtn">Save Changes</button>
          <button class="btn secondary" type="button" id="printBtn">Print Profile</button>
          <a class="btn secondary" href="./home.html">Cancel</a>
        </div>
      </div>
    </main>
  </div>

    const stateSelect = document.getElementById('state');
    const lgaSelect = document.getElementById('capital');

    // Populate States
    Object.keys(stateLgas).sort().forEach(state => {
      const opt = document.createElement('option');
      opt.value = state;
      opt.textContent = state;
      stateSelect.appendChild(opt);
    });

    // Handle State Change
    stateSelect.addEventListener('change', function() {
      const selectedState = this.value;
      lgaSelect.innerHTML = '<option value="">Select LGA</option>';
      
      if (selectedState && stateLgas[selectedState]) {
        stateLgas[selectedState].forEach(lga => {
          const opt = document.createElement('option');
          opt.value = lga;
          opt.textContent = lga;
          lgaSelect.appendChild(opt);
        });
      }
    });

    // Load current user data
    const user = await currentUser();
    if (user) {
      document.getElementById('firstName').value = user.firstName || '';
      document.getElementById('middleName').value = user.middleName || '';
      document.getElementById('lastName').value = user.lastName || '';
      document.getElementById('age').value = user.age || '';
      document.getElementById('classLevel').value = user.classLevel || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('phone').value = user.phone || '';
      document.getElementById('address').value = user.address || '';
      document.getElementById('parentPhone').value = user.parentPhone || '';
      document.getElementById('nextOfKin').value = user.nextOfKin || '';
      
      // Load saved state and LGA
      if (user.state) {
        stateSelect.value = user.state;
        // Trigger change to populate LGAs
        stateSelect.dispatchEvent(new Event('change'));
        if (user.capital) {
          lgaSelect.value = user.capital;
        }
      }
      
      // Set avatar preview if exists
      if (user.avatarDataUrl) {
        document.getElementById('avatarPreview').src = user.avatarDataUrl;
      }
    }
    
    // Profile picture upload functionality
    const avatarUpload = document.getElementById('avatarUpload');
    const avatarPreview = document.getElementById('avatarPreview');
    const uploadBtn = document.getElementById('uploadBtn');
    const profileAvatarPreview = document.getElementById('profileAvatarPreview');
    
    // Click on avatar or button to trigger file input
    profileAvatarPreview.addEventListener('click', () => avatarUpload.click());
    uploadBtn.addEventListener('click', () => avatarUpload.click());
    
    avatarUpload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      // Validate file size (max 2MB)
      if (file.size > 2 * 1024 * 1024) {
        alert('File size too large. Please select an image under 2MB.');
        return;
      }
      
      // Validate file type
      if (!file.type.match('image/jpeg') && !file.type.match('image/png') && !file.type.match('image/gif')) {
        alert('Please select a valid image file (JPG, PNG, or GIF).');
        return;
      }
      
      // Preview image
      const reader = new FileReader();
      reader.onload = async function(event) {
        avatarPreview.src = event.target.result;
        
        // Auto-save the avatar
        await updateCurrentUser({ avatarDataUrl: event.target.result });
        showMessage('Profile picture updated!', false);
        renderSidebar();
      };
      reader.readAsDataURL(file);
    });
    
    // Print button functionality
    document.getElementById('printBtn').addEventListener('click', () => {
      const summary = document.getElementById('printSummary');
      const avatarSrc = document.getElementById('avatarPreview').src;
      summary.innerHTML = `

          <img src="${avatarSrc}" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">

          <div style="color: #666; margin-top: 5px;">Student Profile Summary</div>
        </div>
        <table style="width: 100%; border-collapse: collapse; font-size: 16px;">
          <tbody>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee; width: 40%;"><strong>First Name:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('firstName').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Middle Name:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('middleName').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Last Name:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('lastName').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Email:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('email').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Age:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('age').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Class Level:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('classLevel').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Phone:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('phone').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Address:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('address').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>State of Origin:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('state').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Local Government Area (LGA):</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('capital').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Parent Phone:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('parentPhone').value || '-'}</td></tr>
            <tr><td style="padding: 12px; border-bottom: 1px solid #eee;"><strong>Next of Kin:</strong></td><td style="padding: 12px; border-bottom: 1px solid #eee;">${document.getElementById('nextOfKin').value || '-'}</td></tr>
          </tbody>
        </table>
        <div style="margin-top: 50px; text-align: center; color: #999; font-size: 13px;">
          Generated from School Management Portal
        </div>
      `;
      window.print();
    });
    
    // Save button functionality
    document.getElementById('saveBtn').addEventListener('click', async function() {
      const btn = this;
      const originalText = btn.textContent;
      
      const firstName = document.getElementById('firstName').value.trim();
      const middleName = document.getElementById('middleName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const fullName = [firstName, middleName, lastName].filter(Boolean).join(" ");
      const age = document.getElementById('age').value.trim();
      const classLevel = document.getElementById('classLevel').value;
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const state = document.getElementById('state').value;
      const capital = document.getElementById('capital').value;
      const parentPhone = document.getElementById('parentPhone').value.trim();
      const nextOfKin = document.getElementById('nextOfKin').value.trim();
      
      // Basic validation
      if (!firstName || !lastName) {
        showMessage('Please enter your first and last name.', true);
        return;
      }
      
      try {
        // Indicate saving
        btn.disabled = true;
        btn.textContent = 'Saving...';
        btn.style.opacity = '0.7';

        // Update user data
        await updateCurrentUser({
          fullName,
          firstName,
          middleName,
          lastName,
          age,
          classLevel,
          phone,
          address,
          state,
          capital,
          parentPhone,
          nextOfKin
        });
        
        // Indicate success
        btn.textContent = 'Saved!';
        btn.style.backgroundColor = '#28a745';
        btn.style.color = '#fff';
        btn.style.opacity = '1';
        
        showMessage('Profile updated successfully!', false);
        
        // Refresh sidebar to show updated name/avatar
        renderSidebar();

        // Revert button after delay
        setTimeout(() => {
          btn.textContent = originalText;
          btn.disabled = false;
          btn.style.backgroundColor = '';
          btn.style.color = '';
          btn.style.opacity = '';
        }, 2000);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = originalText;
        btn.style.opacity = '';
        showMessage('Error saving: ' + err.message, true);
      }
    });
    
    // Message display function
    function showMessage(text, isError = false) {
      // Remove existing message
      const existingMsg = document.querySelector('.profile-message');
      if (existingMsg) existingMsg.remove();
      
      // Create new message
      const message = document.createElement('div');
      message.className = 'card profile-message';
      message.style.marginTop = '14px';
      message.style.borderColor = isError ? 'rgba(255,0,0,.35)' : 'var(--border)';
      message.textContent = text;
      
      // Insert after the form
      const card = document.querySelector('.card');
      const btnrow = document.querySelector('.btnrow');
      card.insertBefore(message, btnrow.nextSibling);
      
      // Auto-hide after 3 seconds
      setTimeout(() => {
        if (message.parentNode) {
          message.style.opacity = '0';
          message.style.transition = 'opacity 0.3s';
          setTimeout(() => {
            if (message.parentNode) message.remove();
          }, 300);
        }
      }, 3000);
    }
  </script>
</body>
